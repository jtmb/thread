services:
  thread:
    build: .
    container_name: thread-server
    ports:
      - "${THREAD_PORT:-5000}:5000"
    volumes:
      # Persistent data — survives container rebuilds and upgrades
      - thread_data:/app/data
    environment:
      - THREAD_HOST=0.0.0.0
      - THREAD_PORT=5000
      - THREAD_DB_PATH=/app/data/thread.db
      - THREAD_GIT_BASE=/app/data/git
      - THREAD_LOG_LEVEL=${THREAD_LOG_LEVEL:-INFO}
      - THREAD_DEBUG=false
      - THREAD_POOL_SIZE=${THREAD_POOL_SIZE:-12}
      - THREAD_POOL_TIMEOUT=10
      - THREAD_MAX_SEARCH_RESULTS=100
      - THREAD_CACHE_SIZE=512
      - THREAD_SEARCH_CACHE_SIZE=128
      - THREAD_SEARCH_CACHE_TTL=5
      - THREAD_TAG_CACHE_TTL=30
    restart: unless-stopped
    # Resource limits — conservative for Pi, generous for x86
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

volumes:
  thread_data:
